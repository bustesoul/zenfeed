services:
  zenfeed-web:
    image: ghcr.io/bustesoul/zenfeed-web:dev
    ports:
      - "1400:1400"
    environment:
      - PUBLIC_DEFAULT_API_URL=http://zenfeed:1300
    depends_on:
      - zenfeed
    restart: unless-stopped

  zenfeed:
    image: ghcr.io/bustesoul/zenfeed:dev
    entrypoint: >
      sh -c "
      if [ ! -f /app/config/config.yaml ]; then
        echo 'Config file not found in volume, initializing from init config...'
        cp /app/config.init.yaml /app/config/config.yaml;
      else
        echo 'Existing config file found in volume.'
      fi &&
      echo 'Starting Zenfeed...' &&
      exec /app/zenfeed --config /app/config/config.yaml
      "
    configs:
      - source: zenfeed_init_config
        target: /app/config.init.yaml
    volumes:
      - data:/app/data
      - config:/app/config
    ports:
      - "1300:1300"
      - "1301:1301"
      - "9090:9090"
    environment:
      - AUTH_USERNAME=${AUTH_USERNAME:-}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-}
    depends_on:
      - rsshub
    restart: unless-stopped

  rsshub:
    image: diygod/rsshub:2024-12-14
    ports:
      - "1200:1200"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  data: {}
  config: {}

configs:
  zenfeed_init_config: # After installation, you must modify the configuration through zenfeed or config volume.
    content: |
      timezone: ${TZ:-Asia/Shanghai}
      llms:
        - name: general
          default: true
          provider: openai-responses
          endpoint: ${API_ENDPOINT:-your-api-endpoint}
          model: gpt-5.4
          api_key: ${C_API_KEY:-your-chat-api-key}
        - name: embed
          provider: siliconflow
          embedding_model: Qwen/Qwen3-Embedding-4B
          api_key: ${E_API_KEY:-your_embed-api-key}
      scrape:
        rsshub_endpoint: http://rsshub:1200
      storage:
        feed:
          rewrites:
            - transform:
                to_text:
                  prompt: |
                    {{ .summary_html_snippet_for_small_model }} Respond in ${LANGUAGE:-Chinese}
              label: summary_html_snippet
            # article_analysis uses the default LLM. Configure a separate cheaper model
            # in the llms config (e.g. name: cheap) and reference it via llm: cheap here
            # once you have a second model set up.
            - transform:
                to_text:
                  prompt: |
                    分析这篇文章的内容，仅返回JSON对象，不要其他任何内容：
                    {"base_quality_score":7,"primary_topic":"技术","format":"文章","topics_json":["技术"]}

                    base_quality_score: 1-10整数，评估文章质量（信息密度、深度、原创性）
                    primary_topic: 主要话题（如 AI、Rust、创业、投资、开发工具等）
                    format: 内容形态（快讯、深度分析、教程、观点、盘点、实战案例之一）
                    topics_json: JSON数组，包含所有相关话题标签

                    文章内容：{{ .summary_html_snippet }}
              label: article_analysis
          embedding_llm: embed
      notify:
        channels:
          email:
            feed_html_snippet_template: |
              {{ .summary_html_snippet }}
